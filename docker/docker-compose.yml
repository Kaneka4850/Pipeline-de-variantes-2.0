# ============================================================
# Pipeline de Variantes Germinativas — Docker Compose
# ============================================================
# Uso:
#   docker-compose -f docker/docker-compose.yml up
#   docker-compose -f docker/docker-compose.yml run pipeline bash
# ============================================================

services:
  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: pipeline-variantes:2.0.0
    container_name: pipeline-variantes

    # Volumes organizados
    volumes:
      - ../samples:/opt/pipeline/samples:ro           # FASTQs (somente leitura)
      - ../references:/opt/pipeline/references        # Genoma (leitura/escrita para índices)
      - ../results:/opt/pipeline/results              # Saída
      - ../config:/opt/pipeline/config:ro             # Configuração
      - ../logs:/opt/pipeline/logs                    # Logs
      - ../database:/opt/pipeline/database            # SQLite

    # Variáveis de ambiente para override
    environment:
      - PIPELINE_THREADS=${PIPELINE_THREADS:-4}
      - PIPELINE_MEMORY_MB=${PIPELINE_MEMORY_MB:-8000}

    # Limites de recursos
    deploy:
      resources:
        limits:
          cpus: "${PIPELINE_CPUS:-4}"
          memory: "${PIPELINE_MEMORY:-8G}"
        reservations:
          cpus: "1"
          memory: "2G"

    # Rede
    networks:
      - pipeline-net

    # Restart policy
    restart: "no"

    # Working directory
    working_dir: /opt/pipeline

networks:
  pipeline-net:
    driver: bridge
