$schema: "http://json-schema.org/draft-07/schema#"
description: "Schema de validação para config.yaml do Pipeline de Variantes"
type: object

required:
  - reference
  - dirs
  - resources
  - tools
  - pipeline

properties:
  reference:
    type: object
    required:
      - genome
    properties:
      genome:
        type: string
        description: "Caminho para o FASTA do genoma de referência"
        minLength: 1
      known_sites:
        type: array
        items:
          type: string
        description: "Lista de VCFs com variantes conhecidas para BQSR"

  dirs:
    type: object
    required:
      - samples
      - results
      - logs
      - database
    properties:
      samples:
        type: string
        minLength: 1
      results:
        type: string
        minLength: 1
      logs:
        type: string
        minLength: 1
      database:
        type: string
        minLength: 1

  resources:
    type: object
    required:
      - threads
      - memory_mb
    properties:
      threads:
        type: integer
        minimum: 1
        maximum: 128
      memory_mb:
        type: integer
        minimum: 1000
      max_parallel:
        type: integer
        minimum: 1

  tools:
    type: object
    properties:
      bwa:
        type: string
      gatk:
        type: string
      samtools:
        type: string
      fastqc:
        type: string
      bcftools:
        type: string
      multiqc:
        type: string
      vep:
        type: string

  vep:
    type: object
    properties:
      cache_dir:
        type: string
      plugins_dir:
        type: string
      assembly:
        type: string
        enum: ["GRCh37", "GRCh38"]
      extra_flags:
        type: string

  read_groups:
    type: object
    properties:
      platform:
        type: string
      library:
        type: string
      platform_unit:
        type: string

  pipeline:
    type: object
    required:
      - version
      - name
    properties:
      version:
        type: string
      name:
        type: string
      joint_calling:
        type: boolean
      annotation:
        type: boolean

  sample_detection:
    type: object
    properties:
      r1_patterns:
        type: array
        items:
          type: string
        minItems: 1
      r2_patterns:
        type: array
        items:
          type: string
        minItems: 1
